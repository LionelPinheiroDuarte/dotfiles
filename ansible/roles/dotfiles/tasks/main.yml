---
- name: Create repos directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/repos/github"
    state: directory
    mode: "0755"

- name: Check if dotfiles directory exists
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/repos/github/dotfiles"
  register: dotfiles_dir

- name: Clone dotfiles repository
  ansible.builtin.git:
    repo: https://github.com/LionelPinheiroDuarte/dotfiles.git
    dest: "{{ ansible_env.HOME }}/repos/github/dotfiles"
    update: false
  when: not dotfiles_dir.stat.exists

- name: Symlink dotfiles to $HOME
  ansible.builtin.file:
    src: "{{ ansible_env.HOME }}/repos/github/dotfiles/{{ item.src }}"
    dest: "{{ ansible_env.HOME }}/{{ item.dest }}"
    state: link
    force: true
  loop:
    - { src: "bash/.bashrc",  dest: ".bashrc" }
    - { src: "vim/.vimrc",    dest: ".vimrc" }
    - { src: "vim/.vim",      dest: ".vim" }
    - { src: "tmux/.tmux.conf", dest: ".tmux.conf" }
    - { src: ".gitconfig",    dest: ".gitconfig" }

# Global git hooks dir — core.hooksPath (~/.git-hooks) is set via .gitconfig above.
# Symlink only the post-commit hook so any other hooks in ~/.git-hooks are left alone.
- name: Ensure global git hooks directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.git-hooks"
    state: directory
    mode: "0755"

- name: Symlink the post-commit doc-sync hook
  ansible.builtin.file:
    src: "{{ ansible_env.HOME }}/repos/github/dotfiles/git/hooks/post-commit"
    dest: "{{ ansible_env.HOME }}/.git-hooks/post-commit"
    state: link
    force: true
